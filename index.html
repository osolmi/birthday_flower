<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="탄생화, 탄생일, 꽃">
    <meta name="description" content="당신의 탄생일에 맞는 탄생화를 찾아보세요.">
    <title>나의 탄생화 찾기</title>
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/128/3498/3498122.png" type="image/x-icon">
    <link rel="stylesheet" href="./styles/reset.css">
    <link rel="stylesheet" href="./styles/index.css">
    <script src="./index.js" defer></script>
</head>
<body>
    <main>
        <div class="title">
            <p>The Flower of My Birthday</p>
            <h1>나의 <em>탄생화</em> 찾기</h1>
        </div>
        <div class="contents">
            <input type="number" maxlength="2" id="users_birthday" onclick="birthday12()" placeholder="태어난 달을 숫자로 입력해주세요">
            <button type="button" id="birthday_result_btn" onclick="popup_show()">나의 꽃과 꽃말 만나기</button>
            <!-- a태그는 클릭 시 다른페이지로 이동 -->
            <!-- button 태그 클릭 시 범용기능 동적표현 -->
        </div>
        <div class="popup">
            <p class="sub_title">Birthday Month <span>12</span></p>
            <p class="flower_lang">꽃말 : <em>자기애, 자존심, 외로움</em></p>
            <p class="result">당신의 탄생화는<br><em>'수선화'</em>입니다.</p>
        </div>
        <div class="popup_bg" onclick="popup_close()">
        </div>
    </main>
</body>
</html>
